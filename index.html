<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: white;
    }

    @media (prefers-color-scheme: dark) {
      html, body {
        background: black;
      }
    }

    #contain_moon,
    #contain_moon div {
      background: transparent !important;
    }

    svg {
      background: transparent !important;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <div id="contain_moon">
    <div></div>
    <div style="padding:60px; filter:drop-shadow(0 0 30px hsl(272,100%,26%))"></div>
    <div></div>
    <div></div>
  </div>

  <script>
    (function(){
      var d = new Date().getDate();
      var m = document.querySelectorAll("#contain_moon div");
      var a = new XMLHttpRequest();

      var url =
        "https://www.icalendar37.net/lunar/api/?lang=en&month=" +
        (new Date().getMonth() + 1) +
        "&year=" +
        new Date().getFullYear() +
        "&size=100" +
        "&lightColor=rgb(245,245,245)" +
        "&shadeColor=rgb(17,17,17)" +
        "&t&LDZ=" +
        new Date(new Date().getFullYear(), new Date().getMonth(), 1) / 1000;

      m[1].style.height = "160px";

      a.onreadystatechange = function(){
        if(a.readyState == 4 && a.status == 200){
          var b = JSON.parse(a.responseText);
          m[1].innerHTML = b.phase[d].svg;
        }
      };

      a.open("GET", url, true);
      a.send();
    })();
  </script>
</body>
</html>
